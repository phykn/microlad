data:
  data_dir: data
  patch_size: 64
  batch_size: 8
  num_workers: 4

model:
  latent_ch: 4
  base_ch: 128
  time_dim: 64

diffusion:
  timesteps: 1000

checkpoints:
  vae_ckpt: microlad-anode/vae_anode.pth
  unet_ckpt: null

optimization:
  lr: 1.0e-4
  min_lr: 1.0e-6
  max_grad_norm: 1.0
  accum_steps: 1

training:
  steps: 1000
  save_freq: 1000

output:
  output_dir: output/unet
