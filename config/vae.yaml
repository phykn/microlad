data:
  data_dir: data
  crop_size: 128
  size: 64
  num_phases: 3
  segment: true
  augment: true
  batch_size: 8

model:
  latent_size: 16
  latent_ch: 4
  phase_embedding_dim: 4
  base_ch: 64
  max_ch: 256

loss:
  beta: 0.5
  phase_balance: 0.35

optimization:
  lr: 1.0e-4
  weight_decay: 0.0
  clip_grad_norm: 1.0

training:
  steps: 10000
  save_every: 1000

output:
  run_root: run
