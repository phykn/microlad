data:
  data_dir: data
  crop_size: 128
  size: 64
  num_phases: 3
  segment: true
  augment: true
  batch_size: 8

model:
  latent_size: 16
  latent_ch: 8
  base_ch: 64
  max_ch: 256

loss:
  beta: 1.0

optimization:
  lr: 1.0e-4
  weight_decay: 0.0
  clip_grad_norm: 1.0

training:
  steps: 50000
  save_every: 5000

output:
  run_root: run
