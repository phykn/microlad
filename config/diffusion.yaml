data:
  data_dir: data/train
  augment: true
  batch_size: 8

model:
  base_ch: 128
  time_dim: 64

diffusion:
  timesteps: 1000
  beta_start: 1.0e-4
  beta_end: 2.0e-2

optimization:
  lr: 0.0001
  weight_decay: 0.01
  clip_grad_norm: 1.0

training:
  steps: 10000
  save_every: 1000
  ema_decay: 0.999
  condition_dropout: 0.1

output:
  vae_run_dir: run/20260715-114554-625954
  run_root: run
