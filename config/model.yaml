data:
  data_dir: data/train
  crop_size: 128
  size: 64
  num_phases: 3
  segment: false
  augment: true
  batch_size: 4

model:
  base_ch: 64
  time_dim: 128

diffusion:
  timesteps: 1000
  beta_start: 1.0e-4
  beta_end: 1.0e-2

optimization:
  lr: 3.0e-4
  weight_decay: 0.0
  clip_grad_norm: 1.0

training:
  steps: 50000
  warmup_steps: 10000
  save_every: 1000
  ema_decay: 0.999
  condition_dropout: 0.1

output:
  run_root: run

