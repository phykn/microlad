train:
  steps: 5000
  mix_steps: 1000
  critic_steps: 5
  batch_size: 8
  lr: 1.0e-4
  betas: [0.9, 0.99]
  gradient_weight: 10.0
  reference_count: 8
  mix_probability: 0.1
  preview_count: 3

condition:
  noise_steps: 800
  tune_steps: 500
  candidates: 8
  min_trials: 3
  noise_lr: 5.0e-2
  critic_weight: 1.0e-2
  generator_lr: 1.0e-5
  tune_noise_lr: 2.0e-3
  tune_critic_weight: 2.0e-2
  phase_weight: 50.0
  preserve_weight: 5.0
  transition_weight: 5.0
  influence_sigma: 8.0
  mismatch_tolerance: 0.08
  morphology_tolerance: 0.05
  continuity_tolerance: 0.08

render:
  core_noise_size: 4
  halo_noise_size: 4

intersection_tolerance: 0.0
